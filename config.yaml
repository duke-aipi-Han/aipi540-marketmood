project:
  name: marketmood
  random_seed: 42
  device_preference: mps

paths:
  stockemo_dir: data/stockemo
  train_csv: data/stockemo/train_stockemo.csv
  val_csv: data/stockemo/val_stockemo.csv
  test_csv: data/stockemo/test_stockemo.csv
  price_cache_dir: data/prices
  processed_dir: data/processed
  modeling_dataset: data/processed/modeling_dataset.csv
  outputs_dir: outputs
  metrics_dir: outputs/metrics
  figures_dir: outputs/figures
  predictions_dir: outputs/predictions
  error_analysis_dir: outputs/error_analysis
  classical_model_dir: models/classical
  deep_fusion_model_dir: models/deep_fusion

prices:
  start_buffer_days: 90
  end_buffer_days: 10
  refresh_cache: false
  ticker_aliases:
    BRK.B: BRK-B
    FB: META

labels:
  abnormal_threshold: 0.75
  feature_price_cutoff: t_minus_1
  target_return_window: close_t_to_close_t_plus_1

features:
  price:
    - ret_1d
    - ret_3d
    - ret_5d
    - ret_10d
    - ret_20d
    - vol_5d
    - vol_10d
    - vol_20d
    - volume_z_20d
    - sma_5
    - sma_20
    - close_to_sma20
    - high_low_range
    - gap_return
    - range_position_20d
    - breakout_strength_20d
    - breakdown_strength_20d
  text_format: raw

baseline:
  technical_breakout_threshold: 0.75
  breakout_upper_range: 0.8
  breakout_lower_range: 0.2

classical:
  max_features: 50000
  ngram_range: [1, 2]
  classifier: logistic_regression
  max_iter: 2000
  class_weight: balanced

deep_fusion:
  text_encoder: distilbert-base-uncased
  max_length: 128
  batch_size: 16
  learning_rate: 0.00002
  epochs: 3
  dropout: 0.2
  price_hidden_dim: 64
  use_class_weights: true

app:
  title: MarketMood Investor Signal Dashboard
  default_ticker: AAPL
  model_selector_default: text_price
  server_port: 8760
